<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Librería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="dist/css/styles.css">
  </head>
  <body>
    <header class="fixed-top shadow-sm">
        <nav class="navbar navbar-expand container-fluid px-4">
            <a class="navbar-brand text-white fw-bold" href="#">logo</a>
            <ul class="navbar-nav ms-auto gap-3 flex-row">
               <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-person-circle fs-5"></i></a></li>
               <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-cart fs-5"></i></a></li>
            </ul>
        </nav>
    </header>

    <section class="hero d-flex justify-content-end align-items-center text-end pe-5">
        <h1 class="hero-titulo">Encontrá tu próximo<br>libro favorito</h1>
    </section>

    <section class="container-fluid py-5 px-lg-5">
      <div class="row">
        
        <div class="d-lg-none d-flex justify-content-center mb-4">
            <button class="btn boton-b w-100" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral" aria-controls="menuLateral">
                Mostrar Filtros
            </button>
        </div>

        <div class="col-lg-2 offcanvas-lg offcanvas-start" tabindex="-1" id="menuLateral" aria-labelledby="menuLateralLabel">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title sidebar-titulo" id="menuLateralLabel">Filtros de Búsqueda</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#menuLateral" aria-label="Cerrar"></button>
            </div>
            
            <div class="offcanvas-body flex-column">
                <h5 class="sidebar-titulo d-none d-lg-block">Categorías</h5>
                <ul class="categorias">
                    <li id="boton-noficcion" data-categoria="noficcion">no ficción</li>
                    <li id="boton-ficcion" data-categoria="ficcion" class="active">ficción</li>
                    <li id="boton-infantil" data-categoria="infantil">infantil</li>
                </ul>          
                
                <h5 class="sidebar-titulo mt-4">Géneros</h5>
                
                <div id="generos-ficcion">
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="clasicos" id="checkClasicos">
                        <label class="form-check-label small" for="checkClasicos">Clásicos</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="fantasia" id="checkFantasia">
                        <label class="form-check-label small" for="checkFantasia">Fantasía</label>
                    </div>
                </div>

                <div id="generos-noficcion" class="d-none">
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="biografias" id="checkBio">
                        <label class="form-check-label small" for="checkBio">Biografías</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="historia" id="checkHist">
                        <label class="form-check-label small" for="checkHist">Historia</label>
                    </div>
                </div>

                <div id="generos-infantil" class="d-none">
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="cuentos" id="checkCuentos">
                        <label class="form-check-label small" for="checkCuentos">Cuentos</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input check-genero" type="checkbox" value="educativos" id="checkEdu">
                        <label class="form-check-label small" for="checkEdu">Educativos</label>
                    </div>
                </div>

                <a class="btn boton-a mt-3 py-2 text-center text-decoration-none" href="#" id="btn-aplicar" data-bs-dismiss="offcanvas" data-bs-target="#menuLateral">Aplicar filtros</a>
            </div>
        </div>

        <div class="col-12 col-lg-10">
          <h1 class="text-center titulo-catalogo mb-3">Catálogo</h1>
          
          <div class="d-flex align-items-center justify-content-center gap-2 gap-md-4 mb-5">
            <button class="btn p-0 border-0 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                <i class="bi bi-sliders fs-4 text-dark"></i>
            </button>
            
            <ul class="nav gap-2" id="libros-tabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active tab-ovalado" id="fisicos" data-bs-toggle="tab" data-bs-target="#catalogo-fisicos" type="button" role="tab">libros</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link tab-ovalado" id="ebooks" data-bs-toggle="tab" data-bs-target="#catalogo-ebooks" type="button" role="tab">eBooks</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link tab-ovalado" id="audiolibros" data-bs-toggle="tab" data-bs-target="#catalogo-audiolibros" type="button" role="tab">audiolibros</button>
              </li>
            </ul>
          </div>

          <div class="tab-content" id="catalogoss">
            
            <div class="tab-pane fade show active" id="catalogo-fisicos" role="tabpanel" tabindex="0">
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
                    
                    <div class="col tarjeta-libro" data-categoria="ficcion" data-genero="clasicos">
                        <div class="card border-0 bg-transparent h-100 flex-row flex-lg-column gap-3 align-items-center align-items-lg-start">
                            
                            <div class="col-4 col-lg-12">
                                <img class="img-fluid rounded" src="dist/assets/portadas/elprincipito.jpg">
                            </div>
                            
                            <div class="card-body col-8 col-lg-12 p-0 text-start pe-3 pe-lg-0 d-flex flex-column h-100 w-100">
                                <h6 class="card-title fw-bold mb-1">
                                    El principito
                                </h6>
                                <p class="text-body-secondary mb-1 small">Por: Antoine de Saint-Exupéry</p>
                                <div class="detalles-precio mt-0">
                                    <p class="lh-sm mb-1 text-dark small">96 páginas - tapa dura</p>
                                    <h6 class="fw-bold">UYU$500</h6>
                                </div>

                                <div class="boton-libro mt-auto w-100">
                                    <button class="btn boton-a py-2 fw-bold">Agregar al carrito</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="tab-pane fade" id="catalogo-ebooks" role="tabpanel" tabindex="0">
                <h5 class="text-center py-5 text-muted">miau</h5>
            </div>

            <div class="tab-pane fade" id="catalogo-audiolibros" role="tabpanel" tabindex="0">
                <h5 class="text-center py-5 text-muted">miau</h5>
            </div>

          </div>
        </div>

      </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="dist/js/catalogo.js"></script>
  </body>
</html>
